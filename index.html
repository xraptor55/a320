<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A320 Trainer</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0a1a26;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* HEADER */
h1 {
    margin-top: 20px;
    font-size: 22px;
}

/* START SCREEN */
#start {
    text-align: center;
    margin-top: 40px;
}

input {
    padding: 12px;
    font-size: 18px;
    width: 120px;
    text-align: center;
    border-radius: 10px;
    border: none;
}

button {
    margin-top: 15px;
    padding: 14px 20px;
    font-size: 16px;
    border-radius: 12px;
    border: none;
    background: #1e90ff;
    color: white;
    width: 200px;
}

/* CARD */
#quiz {
    display: none;
    width: 100%;
    max-width: 400px;
    padding: 20px;
}

.card {
    background: #132b3a;
    border-radius: 20px;
    padding: 30px 20px;
    margin-top: 20px;
    min-height: 180px;

    display: flex;
    flex-direction: column;
    justify-content: center;

    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    transition: transform 0.3s;
}

.card.flip {
    transform: rotateY(180deg);
}

.question {
    font-size: 22px;
    font-weight: bold;
}

.answer {
    margin-top: 15px;
    font-size: 20px;
    color: #7dd3fc;
    display: none;
}

/* BUTTONS */
.controls {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.reveal {
    background: #22c55e;
}

.next {
    background: #f59e0b;
}

/* PROGRESS */
#progress {
    margin-top: 10px;
    font-size: 14px;
    opacity: 0.7;
}
</style>
</head>

<body>

<h1>A320 Trainer</h1>

<div id="start">
    <p>Koliko vprašanj?</p>
    <input type="number" id="numQuestions" min="1">
    <br>
    <button onclick="startQuiz()">Start</button>
</div>

<div id="quiz">
    <div id="progress"></div>

    <div class="card" id="card">
        <div class="question" id="question"></div>
        <div class="answer" id="answer"></div>
    </div>

    <div class="controls">
        <button class="reveal" onclick="revealAnswer()">REVEAL</button>
        <button class="next" onclick="nextQuestion()">NEXT</button>
    </div>
</div>

<script>
// 👉 DODAJ VPRAŠANJA TUKAJ
const data = `
Length? 37.57m
Height? 11.75m
Wingspan? 34.1m
Max takeoff weight? 77000 kg
Max landing weight? 64500 kg
Fuel capacity? 24210 L
`;

// parsing
let qaList = data.trim().split("\n").map(line => {
    let [q, a] = line.split("?");
    return {
        question: q + "?",
        answer: a.trim()
    };
});

let selectedQuestions = [];
let currentIndex = 0;

function startQuiz() {
    let num = parseInt(document.getElementById("numQuestions").value);

    if (!num || num < 1) {
        alert("Vnesi število vprašanj!");
        return;
    }

    let shuffled = [...qaList].sort(() => 0.5 - Math.random());
    selectedQuestions = shuffled.slice(0, num);

    currentIndex = 0;

    document.getElementById("start").style.display = "none";
    document.getElementById("quiz").style.display = "block";

    showQuestion();
}

function showQuestion() {
    let q = selectedQuestions[currentIndex];

    document.getElementById("question").innerText = q.question;
    document.getElementById("answer").innerText = q.answer;
    document.getElementById("answer").style.display = "none";

    document.getElementById("progress").innerText =
        (currentIndex + 1) + " / " + selectedQuestions.length;
}

function revealAnswer() {
    document.getElementById("answer").style.display = "block";
}

function nextQuestion() {
    currentIndex++;

    if (currentIndex >= selectedQuestions.length) {
        alert("Konec!");
        location.reload();
        return;
    }

    showQuestion();
}
</script>

</body>
</html>
