<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A320 Trainer</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0a1a26;
    color: white;
    height: 100vh;
}

/* START */
#start {
    text-align: center;
    margin-top: 80px;
}

input[type=range] {
    width: 250px;
}

#sliderValue {
    margin-top: 10px;
    font-size: 20px;
}

button {
    margin-top: 20px;
    padding: 16px;
    font-size: 18px;
    border-radius: 12px;
    border: none;
    background: #1e90ff;
    color: white;
    width: 220px;
}

/* QUIZ WRAPPER */
#quiz {
    display: none;
    height: 100vh;
    flex-direction: column;
}

/* TOP AREA (FIXED HEIGHT → NO JUMPING) */
#content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    height: 70vh; /* ključna stabilna višina */
    padding: 0 20px;
    box-sizing: border-box;
}

/* PROGRESS */
#progress {
    position: absolute;
    top: 10px;
    font-size: 14px;
    opacity: 0.6;
}

/* QUESTION (CENTERED, FIXED POSITION) */
#question {
    font-size: 26px;
    font-weight: bold;
    text-align: center;
}

/* ANSWER (DOES NOT MOVE ANYTHING) */
#answer {
    margin-top: 15px;
    font-size: 22px;
    color: #7dd3fc;
    min-height: 30px; /* rezerviran prostor → NI SKAKANJA */
    text-align: center;
}

/* BIG BOTTOM BUTTON */
#mainBtn {
    height: 30vh; /* 🔥 večji del ekrana */
    width: 100%;
    font-size: 24px;
    border: none;
    background: #22c55e;
    color: white;
}
</style>
</head>

<body>

<!-- START -->
<div id="start">
    <h2>Number of Limitations?</h2>
    <input type="range" id="slider" min="1">
    <div id="sliderValue"></div>
    <button onclick="startQuiz()">Start</button>
</div>

<!-- QUIZ -->
<div id="quiz">

    <div id="content">
        <div id="progress"></div>
        <div id="question"></div>
        <div id="answer"></div>
    </div>

    <button id="mainBtn" onclick="handleButton()">REVEAL</button>

</div>

<script>

const data = `
Length? 37.57m
Height? 11.75m
Wingspan? 34.1m
Max takeoff weight? 77000 kg
Max landing weight? 64500 kg
Fuel capacity? 19300 kg
Max window open speed? 200 kt
Max windshield wipers speed? 230 kt
`;

let qaList = data.trim().split("\n").map(line => {
    let [q, a] = line.split("?");
    return {
        question: q + "?",
        answer: a.trim()
    };
});

// slider
const slider = document.getElementById("slider");
const sliderValue = document.getElementById("sliderValue");

slider.max = qaList.length;
slider.value = qaList.length;
sliderValue.innerText = slider.value;

slider.oninput = () => {
    sliderValue.innerText = slider.value;
};

let selectedQuestions = [];
let currentIndex = 0;
let revealed = false;

function startQuiz() {
    let num = parseInt(slider.value);

    let shuffled = [...qaList].sort(() => 0.5 - Math.random());
    selectedQuestions = shuffled.slice(0, num);

    currentIndex = 0;

    document.getElementById("start").style.display = "none";
    document.getElementById("quiz").style.display = "flex";

    showQuestion();
}

function showQuestion() {
    let q = selectedQuestions[currentIndex];

    document.getElementById("question").innerText = q.question;
    document.getElementById("answer").innerText = "";

    document.getElementById("mainBtn").innerText = "REVEAL";
    revealed = false;

    document.getElementById("progress").innerText =
        (currentIndex + 1) + " / " + selectedQuestions.length;
}

function handleButton() {
    if (!revealed) {
        document.getElementById("answer").innerText =
            selectedQuestions[currentIndex].answer;

        document.getElementById("mainBtn").innerText = "NEXT";
        revealed = true;
    } else {
        currentIndex++;

        if (currentIndex >= selectedQuestions.length) {
            alert("Finished!");
            location.reload();
            return;
        }

        showQuestion();
    }
}

</script>

</body>
</html>
