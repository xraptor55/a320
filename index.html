<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A320 Trainer</title>

<link rel="manifest" href="manifest.json">

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0a1a26;
    color: white;
    height: 100vh;
}

/* START SCREEN */
#start {
    text-align: center;
    margin-top: 80px;
}

input[type=range] {
    width: 250px;
}

#sliderValue {
    margin-top: 10px;
    font-size: 20px;
}

button {
    margin-top: 20px;
    padding: 16px;
    font-size: 18px;
    border-radius: 12px;
    border: none;
    background: #1e90ff;
    color: white;
    width: 220px;
}

/* QUIZ LAYOUT */
#quiz {
    display: none;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

/* CENTER CONTENT */
#content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding-top: 40px;
}

/* QUESTION */
#question {
    font-size: 26px;
    font-weight: bold;
    text-align: center;
}

/* ANSWER */
#answer {
    margin-top: 10px; /* cca 1 cm */
    font-size: 22px;
    color: #7dd3fc;
    display: none;
    text-align: center;
}

/* BUTTON FULL WIDTH */
#mainBtn {
    width: 100%;
    padding: 20px;
    font-size: 20px;
    border: none;
    background: #22c55e;
}

/* PROGRESS */
#progress {
    text-align: center;
    font-size: 14px;
    opacity: 0.6;
    margin-top: 20px;
}
</style>
</head>

<body>

<!-- START -->
<div id="start">
    <h2>Number of Limitations?</h2>
    <input type="range" id="slider" min="1">
    <div id="sliderValue"></div>
    <button onclick="startQuiz()">Start</button>
</div>

<!-- QUIZ -->
<div id="quiz">

    <div id="content">
        <div id="progress"></div>
        <div id="question"></div>
        <div id="answer"></div>
    </div>

    <button id="mainBtn" onclick="handleButton()">REVEAL</button>

</div>

<script>
// DATA
const data = `
Length? 37.57m
Height? 11.75m
Wingspan? 34.1m
Max takeoff weight? 77000 kg
Max landing weight? 64500 kg
Fuel capacity? 24210 L
`;

// parsing
let qaList = data.trim().split("\n").map(line => {
    let [q, a] = line.split("?");
    return {
        question: q + "?",
        answer: a.trim()
    };
});

// slider
const slider = document.getElementById("slider");
const sliderValue = document.getElementById("sliderValue");

slider.max = qaList.length;
slider.value = qaList.length;
sliderValue.innerText = slider.value;

slider.oninput = () => {
    sliderValue.innerText = slider.value;
};

let selectedQuestions = [];
let currentIndex = 0;
let revealed = false;

function startQuiz() {
    let num = parseInt(slider.value);

    let shuffled = [...qaList].sort(() => 0.5 - Math.random());
    selectedQuestions = shuffled.slice(0, num);

    currentIndex = 0;

    document.getElementById("start").style.display = "none";
    document.getElementById("quiz").style.display = "flex";

    showQuestion();
}

function showQuestion() {
    let q = selectedQuestions[currentIndex];

    document.getElementById("question").innerText = q.question;
    document.getElementById("answer").innerText = q.answer;
    document.getElementById("answer").style.display = "none";

    document.getElementById("mainBtn").innerText = "REVEAL";
    revealed = false;

    document.getElementById("progress").innerText =
        (currentIndex + 1) + " / " + selectedQuestions.length;
}

function handleButton() {
    if (!revealed) {
        document.getElementById("answer").style.display = "block";
        document.getElementById("mainBtn").innerText = "NEXT";
        revealed = true;
    } else {
        currentIndex++;

        if (currentIndex >= selectedQuestions.length) {
            alert("Finished!");
            location.reload();
            return;
        }

        showQuestion();
    }
}

// SERVICE WORKER
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
