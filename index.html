<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A320 Trainer</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0a1a26;
    color: white;
    height: 100vh;
}

/* START SCREEN */
#start {
    text-align: center;
    margin-top: 80px;
}

input[type=range] {
    width: 250px;
}

#sliderValue {
    margin-top: 10px;
    font-size: 20px;
}

button {
    margin-top: 20px;
    padding: 16px;
    font-size: 18px;
    border-radius: 12px;
    border: none;
    background: #1e90ff;
    color: white;
    width: 220px;
}

/* QUIZ LAYOUT */
#quiz {
    display: none;
    height: 100vh;
    flex-direction: column;
}

/* CONTENT AREA */
#content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 70vh;
    padding: 0 20px;
    box-sizing: border-box;
    position: relative;
}

/* PROGRESS */
#progress {
    position: absolute;
    top: 10px;
    font-size: 14px;
    opacity: 0.6;
}

/* QUESTION */
#question {
    font-size: 26px;
    font-weight: bold;
    text-align: center;
}

/* ANSWER */
#answer {
    margin-top: 15px;
    font-size: 22px;
    color: #7dd3fc;
    min-height: 30px;
    text-align: center;
}

/* BIG BUTTON */
#mainBtn {
    height: 30vh;
    width: 100%;
    font-size: 24px;
    border: none;
    background: #22c55e;
    color: white;
}
</style>
</head>

<body>

<!-- START SCREEN -->
<div id="start">
    <h2>Number of Limitations?</h2>

    <input type="range" id="slider" min="1">
    <div id="sliderValue"></div>

    <button onclick="startQuiz()">Start</button>
</div>

<!-- QUIZ -->
<div id="quiz">

    <div id="content">
        <div id="progress"></div>
        <div id="question"></div>
        <div id="answer"></div>
    </div>

    <button id="mainBtn" onclick="handleButton()">REVEAL</button>

</div>

<script>

/* -------------------------
   DATABASE (EDIT HERE)
--------------------------*/
const data = `
Load acceleration limits (clean)? -1 g to +2,5 g
Load acceleration limits (other than clean)? 0 g to +2 g
Max operating altitude? 39 800 ft
Max Slats and/or flaps extended altitude? 20 000 ft
Max landing altitude? 9200 ft
Min landing altitude? -1000 ft
Min operating temperature? -72°C
Max runway slope? ±2 %
Normal runway width? 45 m
Min runway width? 30 m
Max x-wind for takeoff/landing? 38 kt
Max cockpit window open speed? 200 kt
Max speed Flaps 1? 230 kt
Max speed Flaps 1+F? 215 kt
Max speed Flaps 2? 200 kt
Max speed Flaps 3? 185 kt
Max speed Flaps FULL? 177 kt
Max operating speed Vmo? 350 kt
Max operating speed Mmo? 0,82 M
Max speed landing gear extended, Vle (kt)? 280 kt
Max speed landing gear extended, Vle (M)? 0,67 M
Max speed landing gear extending, Vlo (kt)? 250 kt
Max speed landing gear extending, Vlo (M)? 0,60 M
Max speed landing gear retracting, Vlo (kt)? 220 kt
Max speed landing gear retracting, Vlo (M)? 0,54 M
Max tire speed? 195 kt
Min control speed Vmcl? 109 kt
Max wipers operating speed? 230 kt
Max taxi weight? 77 400 kg
Max takeoff weight? 77 000 kg
Max landing weight? 64 500 kg
Max zero fuel weight? 61 000 kg
Min weight? 37 230 kg
Avionics ventilation limit 49°C < OAT <= 55°C? 2 h
Avionics ventilation limit 55°C < OAT <= 60°C? 1 h
Avionics ventilation limit 60°C < OAT <= 64°C? 0,5 h
Max + differential pressure? 9 PSI
Max - differential pressure? -1 PSI
Max safety relief valve pressure? 8,6 PSI
Min  autopilot use height at takeoff? 100 ft
Min  autopilot use height in circling approach? 500 ft
Min  autopilot use height for landing CAT I? 160 ft
Min  autopilot use height for landing CAT II? 80 ft
Min  autopilot use height after go-around? 100 ft
Min  autopilot use height in all other phases? 500 ft
Min  autopilot use height for FINAL APP, V/S or FPA mode? 250 ft
Alert height? 100 ft
Max x-wind for ILS/MLS CAT II/CAT III autoland? 20 kt
Max headwind for ILS/MLS CAT II/CAT III autoland? 30 kt
Max tailwind for ILS/MLS CAT II/CAT III autoland? 10 kt
Max ILS G/S beam angle for automatic landing? -3,15°
Min ILS G/S beam angle for automatic landing? -2,5°
Max consecutive APU start attempts before crew must wait 60 min? 3
Max APU N speed? 107%
Max APU operational altitude? 41 000 ft
Max APU battery start altitude? 25 000 ft
APU bleed max altitude to assist engine start? 20 000 ft
APU bleed max altitude for air conditioning and pressurization (single pack ops)? 22 500 ft
APU bleed max altitude for air conditioning and pressurization (dual pack ops)? 15 000 ft
Takeoff all engines operative thrust time limit? 5 min
Takeoff one engine operative thrust time limit? 10 min
Max EGT limit takeoff thrust (IAE)? 635°C
Max EGT limit MCT thrust (IAE)? 610°C
Max EGT limit starting on ground (IAE)? 635°C
Max N1 speed (IAE)? 100%
Max N2 speed (IAE)? 100%
Max oil continuous temperature (IAE)? 155°C
Max transient oil temperature 15 min (IAE)? 165°C
Min starting temperature (IAE)? -40°C
Min temperature before IDLE is exceeded (IAE)? -10°C
Min temperature before takeoff (IAE)? 50°C
Min oil quantity (IAE)? 11 qt
Estimated oil consumption (IAE)? 0,3 qt/h
Min oil pressure (IAE)? 60 PSI
Cooling period after 3 failed start cycles (IAE)? 30 min
How many successive start cycles before 30 min cooling time (IAE)? 3
Max reverse thrust should not be used below? 70 kt
Max x-wind for engine start (IAE)? 35 kt
Max altitude flaps extended? 20 000 ft
Min JET-A1 temperature? -43°C
Max JET-A1 temperature? 54°C
Max allowed fuel imbalance at takeoff, inner tanks, full? 500 kg
Max allowed fuel imbalance at takeoff, outer tanks? 370 kg
Max allowed fuel imbalance at landing, inner tanks, full? 1500 kg
Max allowed fuel imbalance at landing, outer tanks? 690 kg
Min fuel quantity for takeoff? 1500 kg
Icing conditions exist when OAT at or below? 10°C
Severe ice accretion (mm)? 5 mm
Severe ice accretion (in)? 0,2 in
Max brake temperature for takeoff? 300°C
Max NWS angle? ±85°
Max taxi speed with 1 tire per gear deflated? 7 kt
Max taxi speed with 2 tire per gear deflated? 3 kt
Max NWS angle when tire deflated? 30°
IR ground alignment latitude between? 73° North/South
Length? 37,57 m
Height? 11,75 m
Wingspan? 34,1 m
Wingspan with sharklets? 35,8 m
Min 180° turn width? 24 m
Pitch at tail strike, shock absorber fully extended? 13,5°
Pitch at tail strike, shock absorber fully compressed? 11,7°
`;

/* -------------------------
   PARSE
--------------------------*/
let qaList = data.trim().split("\n").map(line => {
    let [q, a] = line.split("?");
    return {
        question: q + "?",
        answer: a.trim()
    };
});

/* -------------------------
   SLIDER
--------------------------*/
const slider = document.getElementById("slider");
const sliderValue = document.getElementById("sliderValue");

slider.max = qaList.length;
slider.value = qaList.length;
sliderValue.innerText = slider.value;

slider.oninput = () => {
    sliderValue.innerText = slider.value;
};

/* -------------------------
   STATE
--------------------------*/
let selectedQuestions = [];
let currentIndex = 0;
let revealed = false;

/* -------------------------
   START QUIZ
--------------------------*/
function startQuiz() {
    let num = parseInt(slider.value);

    // 🔀 Fisher–Yates shuffle
    let shuffled = [...qaList];

    for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }

    selectedQuestions = shuffled.slice(0, num);

    currentIndex = 0;

    document.getElementById("start").style.display = "none";
    document.getElementById("quiz").style.display = "flex";

    showQuestion();
}

/* -------------------------
   SHOW QUESTION
--------------------------*/
function showQuestion() {
    let q = selectedQuestions[currentIndex];

    document.getElementById("question").innerText = q.question;
    document.getElementById("answer").innerText = "";

    document.getElementById("mainBtn").innerText = "REVEAL";
    revealed = false;

    document.getElementById("progress").innerText =
        (currentIndex + 1) + " / " + selectedQuestions.length;
}

/* -------------------------
   BUTTON LOGIC
--------------------------*/
function handleButton() {
    if (!revealed) {

        document.getElementById("answer").innerText =
            selectedQuestions[currentIndex].answer;

        document.getElementById("mainBtn").innerText = "NEXT";
        revealed = true;

    } else {

        currentIndex++;

        if (currentIndex >= selectedQuestions.length) {
            showEndScreen();
            return;
        }

        showQuestion();
    }
}

/* -------------------------
   END SCREEN FIX (NO RELOAD BUG)
--------------------------*/
function showEndScreen() {
    alert("Finished!");

    // reset state
    selectedQuestions = [];
    currentIndex = 0;
    revealed = false;

    // reset UI
    document.getElementById("quiz").style.display = "none";
    document.getElementById("start").style.display = "block";

    document.getElementById("answer").innerText = "";
}

</script>

</body>
</html>
